<svg width="1024" height="1024" viewBox="0 0 1024 1024" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- 背景渐变：水汽蓝 -->
    <linearGradient id="dropGradient" x1="512" y1="50" x2="512" y2="950" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#00E5FF" />
      <stop offset="100%" stop-color="#1200FF" />
    </linearGradient>
    
    <!-- 内部线条阴影，增加视觉深度 -->
    <filter id="softGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="10" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- 1. 水滴外框 -->
  <!-- 路径描述：顶部尖锐，底部浑圆 -->
  <path d="M512 50 C 512 50, 150 450, 150 700 C 150 900, 312 1000, 512 1000 C 712 1000, 874 900, 874 700 C 874 450, 512 50, 512 50Z" 
        fill="url(#dropGradient)" fill-opacity="0.15" stroke="url(#dropGradient)" stroke-width="40" stroke-join="round"/>

  <!-- 2. Git 提交树 (仿 VS Code 风格) -->
  <g filter="url(#softGlow)">
    <!-- 主干线 -->
    <path d="M512 350 L512 850" stroke="white" stroke-width="30" stroke-linecap="round" />
    
    <!-- 分支线条 (左侧分叉再合并回主干) -->
    <path d="M512 750 C 400 750, 380 650, 380 600 C 380 550, 400 450, 512 450" 
          stroke="white" stroke-width="25" fill="none" stroke-linecap="round" />
    
    <!-- 右侧小分叉 (未合并状态) -->
    <path d="M512 650 C 600 650, 650 600, 650 550" 
          stroke="white" stroke-width="25" fill="none" stroke-linecap="round" stroke-opacity="0.6" />

    <!-- 提交节点 (Commit Nodes) -->
    <!-- 底部根节点 -->
    <circle cx="512" cy="800" r="45" fill="white" />
    <!-- 合并节点 -->
    <circle cx="512" cy="450" r="35" fill="white" />
    <!-- 左侧分支节点 -->
    <circle cx="380" cy="600" r="35" fill="white" />
    <!-- 右侧活跃节点 (空心效果，模仿当前分支) -->
    <circle cx="650" cy="550" r="30" fill="none" stroke="white" stroke-width="15" />
    <!-- 顶层最新提交 -->
    <circle cx="512" cy="450" r="15" fill="#00E5FF" />
  </g>
</svg>