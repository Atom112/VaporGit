<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>VaporGit</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: transparent;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      user-select: none;
    }

    .splash {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
      animation: fadeIn 0.4s ease-out both;
    }

    .logo {
      width: 160px;
      height: 160px;
      animation: scaleUp 0.8s cubic-bezier(0.34, 1.56, 0.64, 1) both;
      animation-delay: 0.1s;
    }

    .logo svg {
      width: 100%;
      height: 100%;
      display: block;
    }

    .title {
      color: rgba(255, 255, 255, 0.9);
      font-size: 28px;
      font-weight: 600;
      letter-spacing: 0.5px;
      opacity: 0;
      animation: fadeInUp 0.5s ease-out 0.5s both;
    }

    .subtitle {
      color: rgba(255, 255, 255, 0.35);
      font-size: 13px;
      letter-spacing: 2px;
      text-transform: uppercase;
      opacity: 0;
      animation: fadeInUp 0.5s ease-out 0.65s both;
    }

    /* The droplet fill is animated */
    .logo .drop-bg {
      fill-opacity: 0;
      animation: fillDroplet 1s ease-out 0.3s both;
    }

    @keyframes scaleUp {
      0% { transform: scale(0.15); opacity: 0; }
      60% { transform: scale(1.08); opacity: 1; }
      100% { transform: scale(1); opacity: 1; }
    }

    @keyframes fadeIn {
      0% { opacity: 0; }
      100% { opacity: 1; }
    }

    @keyframes fadeInUp {
      0% { opacity: 0; transform: translateY(12px); }
      100% { opacity: 1; transform: translateY(0); }
    }

    @keyframes fillDroplet {
      0% { fill-opacity: 0; }
      100% { fill-opacity: 0.15; }
    }
  </style>
</head>
<body>
  <div class="splash">
    <div class="logo">
      <svg viewBox="0 0 1024 1024" fill="none" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <linearGradient id="dropGradient" x1="512" y1="50" x2="512" y2="950" gradientUnits="userSpaceOnUse">
            <stop offset="0%" stop-color="#00E5FF" />
            <stop offset="100%" stop-color="#1200FF" />
          </linearGradient>
          <filter id="softGlow" x="-20%" y="-20%" width="140%" height="140%">
            <feGaussianBlur stdDeviation="10" result="blur" />
            <feComposite in="SourceGraphic" in2="blur" operator="over" />
          </filter>
        </defs>
        <path d="M512 50 C 512 50, 150 450, 150 700 C 150 900, 312 1000, 512 1000 C 712 1000, 874 900, 874 700 C 874 450, 512 50, 512 50Z"
              fill="url(#dropGradient)" fill-opacity="0.15" stroke="url(#dropGradient)" stroke-width="40" stroke-join="round"/>
        <g filter="url(#softGlow)">
          <path d="M512 350 L512 850" stroke="white" stroke-width="30" stroke-linecap="round" />
          <path d="M512 750 C 400 750, 380 650, 380 600 C 380 550, 400 450, 512 450"
                stroke="white" stroke-width="25" fill="none" stroke-linecap="round" />
          <path d="M512 650 C 600 650, 650 600, 650 550"
                stroke="white" stroke-width="25" fill="none" stroke-linecap="round" stroke-opacity="0.6" />
          <circle cx="512" cy="800" r="45" fill="white" />
          <circle cx="512" cy="450" r="35" fill="white" />
          <circle cx="380" cy="600" r="35" fill="white" />
          <circle cx="650" cy="550" r="30" fill="none" stroke="white" stroke-width="15" />
          <circle cx="512" cy="450" r="15" fill="#00E5FF" />
        </g>
      </svg>
    </div>
    <div class="title">VaporGit</div>
    <div class="subtitle">Loading...</div>
  </div>

  <script>
    // Wait for all animations to complete, then close splashscreen
    const MIN_DISPLAY_MS = 1800;

    window.addEventListener('load', () => {
      const start = performance.now();

      function tryClose() {
        const elapsed = performance.now() - start;
        const remaining = Math.max(0, MIN_DISPLAY_MS - elapsed);

        setTimeout(() => {
          try {
            if (window.__TAURI_INTERNALS__) {
              window.__TAURI_INTERNALS__.invoke('close_splashscreen');
            }
          } catch (e) {
            // Fallback if not in Tauri context (e.g., dev in browser)
            console.log('Splashscreen done');
          }
        }, remaining);
      }

      tryClose();
    });
  </script>
</body>
</html>
