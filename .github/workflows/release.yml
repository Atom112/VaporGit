name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        platform:
          - ubuntu-22.04
          - macos-latest
          - windows-latest

    runs-on: ${{ matrix.platform }}
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libsoup-3.0-dev \
            libjavascriptcoregtk-4.1-dev \
            librsvg2-dev \
            patchelf

      - name: Install npm dependencies
        run: npm install

      - name: Build and upload
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'VaporGit v__VERSION__'
          releaseBody: |
            ## VaporGit v__VERSION__

            ### Downloads
            - **Windows**: VaporGit__VERSION___x64_en-US.msi
            - **macOS**: VaporGit__VERSION___x64.dmg
            - **Linux (Debian/Ubuntu)**: VaporGit__VERSION___amd64.deb
            - **Linux (Fedora/RHEL)**: VaporGit__VERSION___x86_64.rpm
            - **Linux (universal)**: VaporGit__VERSION___amd64.AppImage
          releaseDraft: true
          prerelease: false
